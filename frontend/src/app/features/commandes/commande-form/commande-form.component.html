<mat-card>
  <mat-card-header>
    <mat-card-title>{{ isEditMode ? 'Modifier la Commande' : 'Nouvelle Commande' }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form (ngSubmit)="onSubmit()" [formGroup]="commandeForm">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Table</mat-label>
        <mat-select formControlName="tableId" required>
          <!-- TODO: Ajouter les options de table dynamiquement -->
          <mat-option value="1">Table 1</mat-option>
          <mat-option value="2">Table 2</mat-option>
          <mat-option value="3">Table 3</mat-option>
        </mat-select>
        <mat-error *ngIf="commandeForm.get('tableId')?.hasError('required')">
          La table est requise
        </mat-error>
      </mat-form-field>

      <div formArrayName="items">
        <!-- TODO: Ajouter la gestion des items de la commande -->
      </div>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Statut</mat-label>
        <mat-select formControlName="status" required>
          <mat-option value="EN_ATTENTE">En attente</mat-option>
          <mat-option value="EN_PREPARATION">En préparation</mat-option>
          <mat-option value="PRETE">Prête</mat-option>
          <mat-option value="SERVIE">Servie</mat-option>
        </mat-select>
        <mat-error *ngIf="commandeForm.get('status')?.hasError('required')">
          Le statut est requis
        </mat-error>
      </mat-form-field>

      <div class="button-row">
        <button (click)="router.navigate(['/commandes'])" mat-button type="button">Annuler</button>
        <button [disabled]="!commandeForm.valid" color="primary" mat-raised-button type="submit">
          {{ isEditMode ? 'Modifier' : 'Créer' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
