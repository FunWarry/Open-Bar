<div class="admin-container">
  <mat-card class="dashboard-card">
    <mat-card-header>
      <mat-card-title>Tableau de bord administrateur</mat-card-title>
      <mat-card-subtitle>
        Bienvenue, {{ (currentUser$ | async)?.username }}
      </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="dashboard-grid">
        <mat-card class="stat-card">
          <mat-card-header>
            <mat-icon mat-card-avatar>people</mat-icon>
            <mat-card-title>Utilisateurs</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div class="stat-value">0</div>
            <div class="stat-label">Utilisateurs actifs</div>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button color="primary">
              <mat-icon>list</mat-icon>
              Voir la liste
            </button>
          </mat-card-actions>
        </mat-card>

        <mat-card class="stat-card">
          <mat-card-header>
            <mat-icon mat-card-avatar>local_bar</mat-icon>
            <mat-card-title>Cocktails</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div class="stat-value">0</div>
            <div class="stat-label">Cocktails enregistrés</div>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button color="primary">
              <mat-icon>list</mat-icon>
              Voir la liste
            </button>
          </mat-card-actions>
        </mat-card>

        <mat-card class="stat-card">
          <mat-card-header>
            <mat-icon mat-card-avatar>inventory_2</mat-icon>
            <mat-card-title>Ingrédients</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div class="stat-value">0</div>
            <div class="stat-label">Ingrédients disponibles</div>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button color="primary">
              <mat-icon>list</mat-icon>
              Voir la liste
            </button>
          </mat-card-actions>
        </mat-card>

        <mat-card class="stat-card">
          <mat-card-header>
            <mat-icon mat-card-avatar>event</mat-icon>
            <mat-card-title>Événements</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div class="stat-value">0</div>
            <div class="stat-label">Événements planifiés</div>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button color="primary">
              <mat-icon>list</mat-icon>
              Voir la liste
            </button>
          </mat-card-actions>
        </mat-card>
      </div>
    </mat-card-content>
  </mat-card>

  <div class="admin-actions">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Actions rapides</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="action-buttons">
          <button mat-raised-button color="primary">
            <mat-icon>person_add</mat-icon>
            Créer un utilisateur
          </button>
          <button mat-raised-button color="accent">
            <mat-icon>add_circle</mat-icon>
            Ajouter un cocktail
          </button>
          <button mat-raised-button color="warn">
            <mat-icon>warning</mat-icon>
            Gérer les rapports
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
